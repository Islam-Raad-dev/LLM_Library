<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة نماذج الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
   
    <header class="header">
        <h1>مكتبة <span>نماذج الذكاء الاصطناعي</span></h1>
        <input type="text" id="searchInput" placeholder="ابحث عن نموذج...">
        <button id="themeToggle">تغيير المظهر</button>
    </header>
 

    <main>
 

        <p id="modelCount"></p>
 
        <nav id="familyNav"></nav>
 
        <div class="status-filter">
            <span>التسعير:</span>
            <button class="filter-btn active" data-status="all">الكل</button>
            <button class="filter-btn" data-status="free">مجاني</button>
            <button class="filter-btn" data-status="semi-free">شبه مجاني</button>
            <button class="filter-btn" data-status="paid">مدفوع</button>
        </div>
 
        <div id="modelGrid"></div>
 
    </main>
 
    <script src="script.js"></script>
</body>
</html>
